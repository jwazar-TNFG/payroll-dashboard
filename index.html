<!DOCTYPE html>
<html>
<head>
    <title>Payroll Dashboard - 1-800-NOFAULT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2d5a4a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .dashboard { 
            max-width: 1400px; 
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; }
            .span-2, .span-3 { grid-column: span 1 !important; }
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .card-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .big-number {
            font-size: 36px;
            font-weight: 700;
            color: #1a365d;
        }
        .header { 
            grid-column: 1 / -1; 
            text-align: center; 
            color: white; 
            margin-bottom: 10px; 
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .span-2 { grid-column: span 2; }
        .span-3 { grid-column: span 3; }
        
        .date-filter {
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .date-filter label {
            font-weight: 600;
            color: #1a365d;
        }
        .date-filter input {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .date-filter input:focus {
            border-color: #00CED1;
        }
        .date-filter button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00CED1, #008B8B);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .date-filter button:hover {
            transform: scale(1.05);
        }
        .quick-filters {
            display: flex;
            gap: 10px;
        }
        .quick-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .quick-btn:hover {
            background: #e0e0e0;
        }
        .quick-btn.active {
            background: #00CED1;
            color: white;
        }
        
        .bar-chart { margin-top: 16px; }
        .bar-item { display: flex; align-items: center; margin: 8px 0; }
        .bar-label { width: 100px; font-size: 13px; font-weight: 500; }
        .bar-container { flex: 1; height: 24px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin: 0 12px; }
        .bar { height: 100%; background: linear-gradient(90deg, #00CED1, #008B8B); border-radius: 4px; transition: width 0.3s; }
        .bar-value { width: 100px; text-align: right; font-size: 13px; font-weight: 600; }
        
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .list-item:last-child { border-bottom: none; }
        .list-name { font-weight: 500; }
        .list-office { font-size: 12px; color: #666; }
        .list-amount { font-weight: 600; color: #1a365d; }
        
        .category-item { display: flex; align-items: center; margin: 12px 0; }
        .category-color { width: 16px; height: 16px; border-radius: 4px; margin-right: 12px; }
        .category-name { flex: 1; font-weight: 500; }
        .category-amount { font-weight: 600; }
        
        .updated { text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 20px; grid-column: 1 / -1; }
        
        .change { font-size: 14px; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 8px; }
        .change.down { background: #d4edda; color: #155724; }
        .change.up { background: #fff3cd; color: #856404; }
    </style>
</head>

        <div class="card span-2">

        <div class="card">

        function filterData(startDate, endDate) {
            return payrollData.filter(r => r.date >= startDate && r.date <= endDate);
        }
        
        function formatCurrency(num) {
            return '$' + num.toLocaleString('en-US', {maximumFractionDigits: 0});
        }
        
        function applyFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            const filtered = filterData(startDate, endDate);
            
            // Total
            const total = filtered.reduce((sum, r) => sum + r.amount, 0);
            document.getElementById('totalPayroll').textContent = formatCurrency(total);
            
            // Employees
            const employees = new Set(filtered.map(r => r.name)).size;
            document.getElementById('totalEmployees').textContent = employees.toLocaleString();
            
            // Offices
            const offices = new Set(filtered.map(r => r.office)).size;
            document.getElementById('officeCount').textContent = `Across ${offices} offices`;
            
            // Avg
            const avg = employees > 0 ? total / employees : 0;
            document.getElementById('avgPerEmployee').textContent = formatCurrency(avg);
            
            // Office breakdown
            const byOffice = {};
            filtered.forEach(r => {
                byOffice[r.office] = (byOffice[r.office] || 0) + r.amount;
            });
            const sortedOffices = Object.entries(byOffice).sort((a, b) => b[1] - a[1]).slice(0, 8);
            const maxOffice = sortedOffices[0]?.[1] || 1;
            
            document.getElementById('officeChart').innerHTML = sortedOffices.map(([office, amount]) => `
                <div class="bar-item">
                    <div class="bar-label">${office}</div>
                    <div class="bar-container">
                        <div class="bar" style="width: ${(amount/maxOffice)*100}%;"></div>
                    </div>
                    <div class="bar-value">${formatCurrency(amount)}</div>
                </div>
            `).join('');
            
            // Categories
            const byCategory = {};
            filtered.forEach(r => {
                byCategory[r.category] = (byCategory[r.category] || 0) + r.amount;
            });
            const sortedCats = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
            const colors = ['#00CED1', '#FFB347', '#87CEEB', '#98D8C8', '#F7DC6F'];
            
            document.getElementById('categoryChart').innerHTML = sortedCats.map(([cat, amount], i) => `
                <div class="category-item">
                    <div class="category-color" style="background: ${colors[i] || '#ccc'};"></div>
                    <div class="category-name">${cat}</div>
                    <div class="category-amount">${formatCurrency(amount)}</div>
                </div>
            `).join('');
            
            // Top earners
            const byPerson = {};
            filtered.forEach(r => {
                if (!byPerson[r.name]) byPerson[r.name] = {office: r.office, total: 0};
                byPerson[r.name].total += r.amount;
            });
            const sortedPeople = Object.entries(byPerson).sort((a, b) => b[1].total - a[1].total).slice(0, 15);
            
            document.getElementById('topEarners').innerHTML = sortedPeople.map(([name, data]) => `
                <div class="list-item">
                    <div>
                        <div class="list-name">${name?.substring(0, 25) || 'Unknown'}</div>
                        <div class="list-office">${data.office}</div>
                    </div>
                    <div class="list-amount">${formatCurrency(data.total)}</div>
                </div>
            `).join('');
        }
        
        function setQuickFilter(period) {
            const today = new Date();
            let start, end;
            
            switch(period) {
                case 'mtd':
                    start = new Date(today.getFullYear(), today.getMonth(), 1);
                    end = today;
                    break;
                case 'lastMonth':
                    start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                    end = new Date(today.getFullYear(), today.getMonth(), 0);
                    break;
                case 'ytd':
                    start = new Date(today.getFullYear(), 0, 1);
                    end = today;
                    break;
                case 'q1':
                    start = new Date(2026, 0, 1);
                    end = new Date(2026, 2, 31);
                    break;
            }
            
            document.getElementById('startDate').value = start.toISOString().split('T')[0];
            document.getElementById('endDate').value = end.toISOString().split('T')[0];
            applyFilter();
        }
        
        // Initial load
        applyFilter();
    </script>
